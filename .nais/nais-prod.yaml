apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: reops-sporingsskript-testsider
  namespace: team-researchops
  labels:
    team: team-researchops
spec:
  image: {{image}}
  port: 3000
  env:
    - name: ENVIRONMENT
      value: production
  ingresses:
    - https://sporingsskript-test.ansatt.nav.no
  replicas:
    min: 1
    max: 2
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      memory: 256Mi
  liveness:
    path: /
    initialDelay: 10
  readiness:
    path: /
    initialDelay: 10
